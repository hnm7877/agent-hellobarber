# Kora Agent - Configuration DeerFlow Harness
config_version: 14

log_level: info

token_usage:
  enabled: true

models:
  - name: llama3.2
    display_name: "Llama 3.2 (Ollama Local)"
    use: langchain_ollama:ChatOllama
    model: llama3.2:latest
    base_url: http://127.0.0.1:11434
    num_predict: 4096
    temperature: 0.7
    supports_thinking: false
    supports_vision: false

sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider

tools:
  - name: list_salons
    group: koup
    use: app.services.kora_agent:list_salons
  - name: list_my_appointments
    group: koup
    use: app.services.kora_agent:list_my_appointments
  - name: get_salon_details
    group: koup
    use: app.services.kora_agent:get_salon_details
  - name: book_appointment
    group: koup
    use: app.services.kora_agent:book_appointment
  - name: web_search
    group: web
    use: deerflow.community.ddg_search.tools:web_search_tool
    max_results: 5

tool_search:
  enabled: false
