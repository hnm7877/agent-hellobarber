# Kora Agent - Configuration DeerFlow Harness !
config_version: 14

log_level: info

token_usage:
  enabled: true

models:
  - name: openrouter-free
    display_name: "OpenRouter Free Models Router"
    use: langchain_openai:ChatOpenAI
    model: openrouter/free
    base_url: https://openrouter.ai/api/v1
    api_key: "$OPEN_ROUTER_API_KEY"
    temperature: 0.7
    supports_thinking: false
    supports_vision: false

sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider

tools:
  - name: list_salons
    group: koup
    use: app.services.kora_agent:list_salons
  - name: list_my_appointments
    group: koup
    use: app.services.kora_agent:list_my_appointments
  - name: get_salon_details
    group: koup
    use: app.services.kora_agent:get_salon_details
  - name: book_appointment
    group: koup
    use: app.services.kora_agent:book_appointment
  - name: reschedule_appointment
    group: koup
    use: app.services.kora_agent:reschedule_appointment
  - name: cancel_appointment
    group: koup
    use: app.services.kora_agent:cancel_appointment
  - name: get_available_slots
    group: koup
    use: app.services.kora_agent:get_available_slots
  - name: search_marketplace_products
    group: koup
    use: app.services.kora_agent:search_marketplace_products
  - name: search_salons_by_service
    group: koup
    use: app.services.kora_agent:search_salons_by_service
  - name: list_salon_appointments
    group: koup_pro
    use: app.services.kora_agent:list_salon_appointments
  - name: get_pro_dashboard_summary
    group: koup_pro
    use: app.services.kora_agent:get_pro_dashboard_summary
  - name: get_low_stock_products
    group: koup_pro
    use: app.services.kora_agent:get_low_stock_products
  - name: get_salon_analytics
    group: koup_pro
    use: app.services.kora_agent:get_salon_analytics
  - name: web_search
    group: web
    use: deerflow.community.ddg_search.tools:web_search_tool
    max_results: 5

tool_search:
  enabled: false

